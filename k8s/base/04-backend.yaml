---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yoyang-radar-backend
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: yoyang-radar-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: yoyang-radar
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: yoyang-radar-backend
  template:
    metadata:
      labels:
        app: yoyang-radar-backend
        app.kubernetes.io/name: yoyang-radar-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/v1/health/metrics"
    spec:
      containers:
        - name: backend
          image: yoyangradar/backend:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: yoyang-radar-config
          env:
            - name: DATABASE_URL
              value: "postgresql://yoyang:$(DB_PASSWORD)@postgres-service:5432/yoyangradar?schema=public"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: JWT_EXPIRES_IN
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: KIMI_API_KEY
            - name: KIMI_API_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: KIMI_API_ENDPOINT
            - name: PUBLIC_DATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: PUBLIC_DATA_API_KEY
            - name: EMR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: EMR_API_KEY_DEFAULT
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: SLACK_WEBHOOK_URL
                  optional: true
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: yoyang-radar-secrets
                  key: DISCORD_WEBHOOK_URL
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: yoyang-radar-backend-service
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: yoyang-radar-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: yoyang-radar-backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
---
# Backend HPA (Horizontal Pod Autoscaler)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yoyang-radar-backend-hpa
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: yoyang-radar-backend
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yoyang-radar-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: yoyang-radar-backend-pdb
  namespace: yoyang-radar
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: yoyang-radar-backend