---
# TLS Certificate (cert-manager용 Certificate 리소스)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yoyang-radar-tls
  namespace: yoyang-radar
spec:
  secretName: yoyang-radar-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - yoyang-radar.kr
    - www.yoyang-radar.kr
    - api.yoyang-radar.kr
    - admin.yoyang-radar.kr
---
# Staging Certificate (for testing)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yoyang-radar-tls-staging
  namespace: yoyang-radar
spec:
  secretName: yoyang-radar-tls-staging-secret
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - staging.yoyang-radar.kr
---
# Main Ingress (Frontend + API)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yoyang-radar-ingress
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: yoyang-radar
    app.kubernetes.io/component: ingress
  annotations:
    # Ingress Controller
    kubernetes.io/ingress.class: nginx
    
    # TLS 설정
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # Nginx 특정 설정
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    
    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://yoyang-radar.kr, https://admin.yoyang-radar.kr"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # Security
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yoyang-radar.kr
        - www.yoyang-radar.kr
        - api.yoyang-radar.kr
      secretName: yoyang-radar-tls-secret
  rules:
    # Main Website
    - host: yoyang-radar.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yoyang-radar-frontend-service
                port:
                  number: 80
    
    # API Server
    - host: api.yoyang-radar.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yoyang-radar-backend-service
                port:
                  number: 3001
    
    # Admin Dashboard
    - host: admin.yoyang-radar.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yoyang-radar-frontend-service
                port:
                  number: 80
---
# API Rate Limiting Policy (for specific endpoints)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yoyang-radar-api-limits
  namespace: yoyang-radar
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.yoyang-radar.kr
      secretName: yoyang-radar-tls-secret
  rules:
    - host: api.yoyang-radar.kr
      http:
        paths:
          # AI endpoints (more restrictive)
          - path: /v1/ai
            pathType: Prefix
            backend:
              service:
                name: yoyang-radar-backend-service
                port:
                  number: 3001
          # Extract endpoints (file upload)
          - path: /v1/extract
            pathType: Prefix
            backend:
              service:
                name: yoyang-radar-backend-service
                port:
                  number: 3001