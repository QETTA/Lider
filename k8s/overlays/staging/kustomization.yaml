apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yoyang-radar-dev

resources:
  - ../../base/00-namespace.yaml
  - ../../base/01-configmap.yaml
  - ../../base/02-secret.yaml
  - ../../base/03-postgres.yaml
  - ../../base/04-backend.yaml
  - ../../base/05-frontend.yaml

# Staging-specific patches - reduce resources
patchesStrategicMerge:
  - backend-resources.yaml

images:
  - name: yoyangradar/backend
    newTag: develop
  - name: yoyangradar/frontend
    newTag: develop

commonLabels:
  environment: staging
  managed-by: kustomize