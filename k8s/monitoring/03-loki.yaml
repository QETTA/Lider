---
# Loki ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: loki
data:
  loki.yml: |
    auth_enabled: false
    
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
    
    common:
      path_prefix: /tmp/loki
      storage:
        filesystem:
          chunks_directory: /tmp/loki/chunks
          rules_directory: /tmp/loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100
    
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    
    storage_config:
      boltdb_shipper:
        active_index_directory: /tmp/loki/boltdb-shipper-active
        cache_location: /tmp/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: filesystem
      filesystem:
        directory: /tmp/loki/chunks
    
    compactor:
      working_directory: /tmp/loki/boltdb-shipper-compactor
      shared_store: filesystem
    
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      per_stream_rate_limit: 10MB
      per_stream_rate_limit_burst: 20MB
---
# Promtail ConfigMap (Log Collection Agent)
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: promtail
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    
    positions:
      filename: /tmp/positions.yaml
    
    clients:
      - url: http://loki:3100/loki/api/v1/push
    
    scrape_configs:
      # Backend API Logs
      - job_name: backend
        static_configs:
          - targets:
              - localhost
            labels:
              job: yoyang-radar-backend
              __path__: /var/log/containers/*yoyang-radar-backend*.log
        pipeline_stages:
          - json:
              expressions:
                timestamp: time
                level: level
                message: msg
                trace_id: traceId
                user_id: userId
                path: path
                method: method
                status: status
                duration: responseTime
          - labels:
              level:
              trace_id:
              user_id:
          - timestamp:
              source: timestamp
              format: RFC3339
      
      # Frontend Nginx Logs
      - job_name: frontend
        static_configs:
          - targets:
              - localhost
            labels:
              job: yoyang-radar-frontend
              __path__: /var/log/containers/*yoyang-radar-frontend*.log
        pipeline_stages:
          - regex:
              expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]+)" "(?P<http_user_agent>[^"]+)"'
          - labels:
              status:
              request:
          - timestamp:
              source: time_local
              format: 02/Jan/2006:15:04:05 -0700
      
      # PostgreSQL Logs
      - job_name: postgres
        static_configs:
          - targets:
              - localhost
            labels:
              job: postgres
              __path__: /var/log/containers/*postgres*.log
        pipeline_stages:
          - regex:
              expression: '^(?P<timestamp>[\d-]+ [\d:]+) (?P<level>[A-Z]+): (?P<message>.+)$'
          - labels:
              level:
          - timestamp:
              source: timestamp
              format: 2006-01-02 15:04:05
---
# AlertManager ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: yoyang-radar
  labels:
    app.kubernetes.io/name: alertmanager
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@yoyang-radar.kr'
      smtp_auth_username: 'alerts@yoyang-radar.kr'
      slack_api_url: '${SLACK_WEBHOOK_URL}'
    
    templates:
      - '/etc/alertmanager/templates/*.tmpl'
    
    route:
      receiver: 'default-receiver'
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          continue: true
        - match:
            severity: warning
          receiver: 'warning-alerts'
          continue: true
        - match:
            team: ai
          receiver: 'ai-team-alerts'
        - match:
            team: platform
          receiver: 'platform-team-alerts'
    
    receivers:
      - name: 'default-receiver'
        slack_configs:
          - channel: '#yoyang-radar-alerts'
            title: '요양레이다 알림'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
            send_resolved: true
      
      - name: 'critical-alerts'
        slack_configs:
          - channel: '#yoyang-radar-critical'
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *심각도:* {{ .Labels.severity }}
              *서비스:* {{ .Labels.job }}
              *설명:* {{ .Annotations.description }}
              *발생시간:* {{ .StartsAt }}
              {{ end }}
            send_resolved: true
            color: 'danger'
        webhook_configs:
          - url: '${DISCORD_WEBHOOK_URL}'
            send_resolved: true
      
      - name: 'warning-alerts'
        slack_configs:
          - channel: '#yoyang-radar-warnings'
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true
            color: 'warning'
      
      - name: 'ai-team-alerts'
        slack_configs:
          - channel: '#ai-team'
            title: '🤖 AI 서비스 알림'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
            send_resolved: true
      
      - name: 'platform-team-alerts'
        slack_configs:
          - channel: '#platform-team'
            title: '🔧 인프라 알림'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
            send_resolved: true
    
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'instance']