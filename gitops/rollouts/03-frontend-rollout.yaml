# Argo Rollouts: Frontend Blue/Green Deployment
# Frontend는 Blue/Green 방식으로 배포 (즉시 전환)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: lider-frontend
  namespace: lider-production
  labels:
    app: lider-frontend
    component: web
spec:
  replicas: 3
  strategy:
    blueGreen:
      # Preview 서비스 (Green)
      activeService: lider-frontend-active
      previewService: lider-frontend-preview
      
      # 자동 전환 설정
      autoPromotionEnabled: false  # 수동 승인 후 전환
      autoPromotionSeconds: 300   # 5분 후 자동 전환 (옵션)
      
      # 전환 전 분석 실행
      prePromotionAnalysis:
        templates:
          - templateName: frontend-e2e-tests
        args:
          - name: preview-url
            value: "http://lider-frontend-preview"
      
      # 스케일 다운 지연 (롤백용)
      scaleDownDelaySeconds: 600  # 10분간 old version 유지
      
      # 최대 replica 수 제한
      maxSurge: 100%
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: lider-frontend
  
  template:
    metadata:
      labels:
        app: lider-frontend
        component: web
    spec:
      containers:
        - name: frontend
          image: lider/frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.lider.ai"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Active Service (Blue - 현재 트래픽)
apiVersion: v1
kind: Service
metadata:
  name: lider-frontend-active
  namespace: lider-production
  labels:
    app: lider-frontend
    role: active
spec:
  selector:
    app: lider-frontend
    # active 레이블은 Rollout이 자동으로 관리
  ports:
    - port: 80
      targetPort: 3000
      name: http

---
# Preview Service (Green - 새 버전 테스트)
apiVersion: v1
kind: Service
metadata:
  name: lider-frontend-preview
  namespace: lider-production
  labels:
    app: lider-frontend
    role: preview
spec:
  selector:
    app: lider-frontend
    # preview 레이블은 Rollout이 자동으로 관리
  ports:
    - port: 80
      targetPort: 3000
      name: http
