# ArgoCD Project for LIDER Platform
# 리소스 격리 및 접근 제어를 위한 프로젝트 설정
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: lider-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: LIDER 요양레이다 플랫폼 프로젝트
  
  # 허용된 소스 저장소
  sourceRepos:
    - 'https://github.com/QETTA/Lider.git'
    - 'https://github.com/QETTA/yoyang-radar.git'
  
  # 허용된 대상 네임스페이스
  destinations:
    - namespace: lider-staging
      server: https://kubernetes.default.svc
    - namespace: lider-production
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  
  # 허용된 리소스 종류 (모두 허용)
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  
  # 역할 기반 접근 제어
  roles:
    # 관리자 역할
    - name: admin
      description: 프로젝트 관리자
      policies:
        - p, proj:lider-platform:admin, applications, *, lider-platform/*, allow
        - p, proj:lider-platform:admin, exec, create, lider-platform/*, allow
      groups:
        - lider-admins
    
    # 개발자 역할 (staging만 동기화 가능)
    - name: developer
      description: 개발자 (staging 환경)
      policies:
        - p, proj:lider-platform:developer, applications, sync, lider-platform/lider-staging, allow
        - p, proj:lider-platform:developer, applications, get, lider-platform/*, allow
      groups:
        - lider-developers
    
    # 운영자 역할 (읽기 전용 + 롤백만 가능)
    - name: operator
      description: 운영자 (롤백 권한)
      policies:
        - p, proj:lider-platform:operator, applications, sync, lider-platform/lider-production, allow
        - p, proj:lider-platform:operator, applications, get, lider-platform/*, allow
        - p, proj:lider-platform:operator, applications, rollback, lider-platform/lider-production, allow
      groups:
        - lider-operators
  
  # 자동 동기화 설정
  syncWindows:
    # 운영 시간대 배포 금지 (한국 시간 기준)
    - kind: deny
      schedule: '0 9-18 * * 1-5'
      duration: 9h
      applications:
        - lider-production
      namespaces:
        - lider-production
      manualSync: true  # 수동 동기화는 허용
    
    # 배치 작업 허용 시간대
    - kind: allow
      schedule: '0 2 * * *'
      duration: 2h
      applications:
        - '*'
  
  # Orphaned 리소스 정리 정책
  orphanedResources:
    warn: true
  
  # 리소스 건수 제한
  resourceQuota:
    hard:
      count/deployments: 20
      count/services: 20
      count/ingresses: 10
      count/secrets: 30
      count/configmaps: 20
