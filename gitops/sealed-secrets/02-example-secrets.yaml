# Sealed Secrets Examples
# kubeseal CLI로 암호화된 Secret 예시
# 사용법: kubeseal --controller-namespace=kube-system -f secret.yaml -w sealed-secret.yaml

---
# Database Credentials (암호화된 Secret)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lider-db-credentials
  namespace: lider-production
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    DATABASE_URL: AgC4... # 암호화된 값 (kubeseal로 생성)
    DATABASE_USERNAME: AgC5...
    DATABASE_PASSWORD: AgC6...
  template:
    metadata:
      name: lider-db-credentials
      namespace: lider-production
      labels:
        app: lider-backend
    type: Opaque

---
# API Keys (암호화된 Secret)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lider-api-keys
  namespace: lider-production
spec:
  encryptedData:
    MOONSHOT_API_KEY: AgC7...
    ANTHROPIC_API_KEY: AgC8...
    HUGGINGFACE_TOKEN: AgC9...
    JWT_SECRET: AgC10...
  template:
    metadata:
      name: lider-api-keys
      namespace: lider-production
      labels:
        app: lider-backend

---
# External Service Credentials
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lider-external-services
  namespace: lider-production
spec:
  encryptedData:
    EMR_SERVICE_KEY: AgC11...
    EMR_API_SECRET: AgC12...
    S3_ACCESS_KEY: AgC13...
    S3_SECRET_KEY: AgC14...
  template:
    metadata:
      name: lider-external-services
      namespace: lider-production

---
# GitHub Token for ArgoCD
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-token
  namespace: argocd
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"  # 모든 네임스페이스에서 사용 가능
spec:
  encryptedData:
    token: AgC15...
  template:
    metadata:
      name: github-token
      namespace: argocd

---
# ArgoCD Admin Credentials
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-admin
  namespace: argocd
spec:
  encryptedData:
    password: AgC16...
  template:
    metadata:
      name: argocd-admin
      namespace: argocd

---
# TLS Certificates
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lider-tls-cert
  namespace: lider-production
spec:
  encryptedData:
    tls.crt: AgC17...
    tls.key: AgC18...
  template:
    metadata:
      name: lider-tls-cert
      namespace: lider-production
    type: kubernetes.io/tls
