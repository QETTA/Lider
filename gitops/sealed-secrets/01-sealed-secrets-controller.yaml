# Sealed Secrets Controller Setup
# GitOps 환경에서 안전한 Secret 관리
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: sealed-secrets
  namespace: kube-system
spec:
  chart: sealed-secrets
  repo: https://bitnami-labs.github.io/sealed-secrets
  targetNamespace: kube-system
  version: 2.13.0
  valuesContent: |-
    fullnameOverride: sealed-secrets-controller
    
    # 리소스 설정
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    # RBAC 설정
    rbac:
      create: true
      namespaced: false
    
    # 서비스 설정
    service:
      type: ClusterIP
      port: 8080
    
    # 인증서 유효 기간 (10년)
    keyRenewPeriod: "87600h"
    
    # 모니터링
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: monitoring

---
# Network Policy for Sealed Secrets
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sealed-secrets-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: kube-system
        - namespaceSelector:
            matchLabels:
              name: argocd
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - {}  # 모든 아웃바운드 허용
