name: LIDER CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'lider-platform/apps/api/**'
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  WORKING_DIRECTORY: lider-platform/apps/api

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt

      - name: Run Ruff linting
        run: ruff check core/ routes/ --output-format=github

      - name: Run Ruff format check
        run: ruff format --check core/ routes/

      - name: Run type checking (mypy)
        run: mypy core/ --ignore-missing-imports

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov aiosqlite
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=core --cov-report=xml --cov-report=term --cov-fail-under=50

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.WORKING_DIRECTORY }}/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  golden-tests:
    name: Golden Set Tests
    runs-on: ubuntu-latest
    needs: [code-quality, tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Golden Set tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "Running Golden Set tests..."
          python -m pytest tests/golden/ -v --tb=short || echo "Golden tests completed"

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check build artifacts
        run: |
          if [ ! -d "frontend/dist" ] && [ ! -d "frontend/build" ]; then
            echo "❌ Build artifacts not found"
            exit 1
          fi
          echo "✅ Frontend build successful"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r core/ routes/ -f json -o bandit-report.json || true

      - name: Check Bandit report
        run: |
          if [ -f bandit-report.json ]; then
            high_severity=$(cat bandit-report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(len([r for r in d.get('results',[]) if r['issue_severity'] in ['HIGH','CRITICAL']]));" 2>/dev/null || echo "0")
            if [ "$high_severity" -gt 0 ]; then
              echo "❌ Found $high_severity high/critical severity issues"
              cat bandit-report.json | python3 -m json.tool | head -50
              exit 1
            fi
            echo "✅ No high/critical security issues found"
          fi

      - name: Run npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || echo "⚠️ npm audit completed with warnings"

  build-and-notify:
    name: Build Success Notification
    runs-on: ubuntu-latest
    needs: [code-quality, tests, frontend-build, security-scan]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

      - name: Notify on success
        if: needs.code-quality.result == 'success' && needs.tests.result == 'success' && needs.frontend-build.result == 'success'
        run: |
          echo "✅ LIDER CI/CD Pipeline completed successfully!"
          echo "All quality gates passed:"
          echo "  - Ruff linting: ✓"
          echo "  - MyPy type checking: ✓"
          echo "  - Pytest with coverage: ✓"
          echo "  - Frontend build: ✓"
          echo "  - Security scan: ✓"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ LIDER CI/CD Pipeline failed"
          echo "Please check the logs above for details"
