# Docker Compose Override for Development
# This file extends docker-compose.yml for local development

services:
  # Override backend for development (hot reload)
  backend:
    build:
      target: development
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    command: npm run dev

  # AI Proxy Service (for development)
  ai-proxy:
    build:
      context: ./ai-proxy
      dockerfile: Dockerfile
    container_name: lider-ai-proxy
    environment:
      NODE_ENV: development
      PORT: 3002
      HOST: 0.0.0.0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:-dev-secret-do-not-use-in-production}
      LOG_LEVEL: debug
    ports:
      - "${AI_PROXY_PORT:-3002}:3002"
    networks:
      - yoyang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Frontend dev server (Vite HMR)
  frontend:
    build:
      target: development
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
      CHOKIDAR_USEPOLLING: "true"  # For file watching in Docker
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: npm run dev -- --host

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: yoyang-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lider.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    networks:
      - yoyang-network
    restart: unless-stopped
    profiles:
      - tools  # Only start with: docker-compose --profile tools up
